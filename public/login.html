<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SECOP Cotações</title>
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('secop_tema')||'light');</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, Arial, sans-serif;
      background: #f0f4f1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 16px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo-img {
      max-width: 200px;
      height: auto;
      margin-bottom: 12px;
    }
    .logo-diamond {
      display: inline-block;
      margin-bottom: 12px;
    }
    .login-logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1A6B35;
      letter-spacing: .5px;
    }
    .login-logo p {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      padding: 32px 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
    }
    .login-card h2 {
      font-size: 17px;
      font-weight: 700;
      color: #1a2035;
      margin-bottom: 4px;
    }
    .login-card p {
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e0e4ea;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    .form-group input:focus { border-color: #1A6B35; }
    .btn-login {
      width: 100%;
      padding: 11px;
      background: #1A6B35;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background .15s;
    }
    .btn-login:hover { background: #155929; }
    .btn-login:disabled { background: #aaa; cursor: not-allowed; }
    .error-msg {
      display: none;
      background: #FFEBEE;
      border: 1px solid #EF9A9A;
      color: #C62828;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 14px;
    }
    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: #aaa;
    }
    [data-theme="dark"] body { background: #0d1117; }
    [data-theme="dark"] .login-logo h1 { color: #58a6ff; }
    [data-theme="dark"] .login-logo p  { color: #8b949e; }
    [data-theme="dark"] .login-card {
      background: #161b22;
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
    }
    [data-theme="dark"] .login-card h2 { color: #e6edf3; }
    [data-theme="dark"] .login-card p  { color: #8b949e; }
    [data-theme="dark"] .form-group label { color: #8b949e; }
    [data-theme="dark"] .form-group input {
      background: #0d1117;
      border-color: #30363d;
      color: #e6edf3;
    }
    [data-theme="dark"] .form-group input:focus { border-color: #1A6B35; }
    [data-theme="dark"] .login-footer { color: #6e7681; }
  </style>
</head>
<body>
<div class="login-wrap">

  <div class="login-logo">
    <img src="img/Logo_1_transp.png" alt="CEASAMINAS" class="login-logo-img"
      onerror="this.style.display='none';this.nextElementSibling.style.display='block'"/>
    <div class="logo-diamond" style="display:none;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="64" height="64">
        <polygon points="28,2 2,28 28,28" fill="#fff"/>
        <polygon points="28,2 54,28 28,28" fill="#F9A800"/>
        <polygon points="54,28 28,54 28,28" fill="#fff"/>
        <polygon points="2,28 28,54 28,28" fill="#fff"/>
      </svg>
    </div>
    <h1>SECOP · Cotações</h1>
    <p>CEASAMINAS</p>
  </div>

  <div class="login-card">
    <h2>Bem-vindo</h2>
    <p>Acesse com suas credenciais</p>

    <div class="error-msg" id="error-msg"></div>

    <form id="login-form" onsubmit="fazerLogin(event)">
      <div class="form-group">
        <label>Usuário</label>
        <input type="text" id="username" autocomplete="username" placeholder="Digite seu usuário" required />
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="senha" autocomplete="current-password" placeholder="••••••••" required />
      </div>
      <button class="btn-login" type="submit" id="btn-login">Entrar</button>
    </form>
  </div>

  <div class="login-footer">CEASAMINAS · Centrais de Abastecimento de Minas Gerais</div>
</div>

<script>
async function fazerLogin(e) {
  e.preventDefault();
  const btn  = document.getElementById('btn-login');
  const err  = document.getElementById('error-msg');
  btn.disabled   = true;
  btn.textContent = 'Entrando...';
  err.style.display = 'none';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        senha:    document.getElementById('senha').value
      })
    });
    if (!res.ok) {
      const data = await res.json();
      err.textContent = data.error || 'Erro ao fazer login';
      err.style.display = 'block';
      return;
    }
    window.location.replace('/index.html');
  } catch {
    err.textContent = 'Erro de conexão com o servidor';
    err.style.display = 'block';
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Entrar';
  }
}
</script>
</body>
</html>
