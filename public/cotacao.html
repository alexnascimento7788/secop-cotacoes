<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cotação — SECOP Cotações</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1A6B35">
  <link rel="apple-touch-icon" href="img/icons/apple-touch-icon.png">
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('secop_tema')||'light');</script>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar no-print">
    <div class="sidebar-brand">
      <img src="img/Ceasa_Signea.png" alt="CEASAMINAS" class="sidebar-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <div class="sidebar-logo-fallback" style="display:none;align-items:center;gap:10px;margin-bottom:8px;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="32" height="32" style="flex-shrink:0"><polygon points="20,1 1,20 20,20" fill="#1A6B35"/><polygon points="20,1 39,20 20,20" fill="#F9A800"/><polygon points="39,20 20,39 20,20" fill="#1A6B35"/><polygon points="1,20 20,39 20,20" fill="#1A6B35"/></svg>
        <div><div class="logo-title">SECOP · Cotações</div><div class="logo-sub">CEASAMINAS</div></div>
      </div>
      <div class="logo-divider"></div>
    </div>
    <nav>
      <a href="index.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="processos.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Processos
      </a>
      <a href="novo-processo.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Novo Processo
      </a>
    </nav>
    <div class="sidebar-footer">
      <span id="sidebar-username" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px;">—</span>
      <div style="display:flex;gap:2px;flex-shrink:0;">
        <a href="admin.html" class="sidebar-gear" title="Administração">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </a>
        <button onclick="logout()" class="sidebar-gear" title="Sair" style="background:none;border:none;cursor:pointer;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main-content">

    <div id="loader" class="loader">Carregando processo...</div>

    <div id="content" style="display:none;">

      <!-- ═══ BLOCO EXCLUSIVO DE IMPRESSÃO ═══ -->
      <div class="print-only" id="print-block">
        <!-- Tabela unificada gerada dinamicamente em JS por atualizarPrintBlock() -->
      </div>

      <!-- ═══ CABEÇALHO DO PROCESSO (somente tela) ═══ -->
      <div class="process-header no-print" id="ph-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:12px;flex-wrap:wrap;">
          <div>
            <div class="process-numero" id="ph-numero"></div>
            <div id="ph-objeto-txt" style="font-size:17px;font-weight:700;color:#222;margin-top:3px;line-height:1.3;max-width:600px;"></div>
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <label style="display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:#5a6478;cursor:pointer;white-space:nowrap;">
              <input type="checkbox" id="chk-menor-preco" style="cursor:pointer;"> Destacar menor preço
            </label>
            <select id="status-select" class="status-select"></select>
            <a href="#" id="btn-editar-forn" class="btn btn-outline btn-sm">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
              Editar fornecedores
            </a>
            <a href="processos.html" class="btn btn-secondary btn-sm">Voltar</a>
            <button class="btn btn-secondary btn-sm" id="btn-print">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
              Imprimir
            </button>
            <button class="btn btn-primary btn-sm" id="btn-salvar-obs">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
              Salvar OBS
            </button>
          </div>
        </div>
        <div id="ph-meta" class="process-meta"></div>
      </div>

      <!-- ═══ INFORMAÇÕES DOS FORNECEDORES (somente tela) ═══ -->
      <div class="no-print preco-table-wrap" id="forn-info-wrap" style="margin-bottom:20px;display:none;">
        <div style="padding:12px 16px;border-bottom:1px solid #e0e4ea;">
          <span class="card-title" style="font-size:13px;font-weight:700;color:#5a6478;text-transform:uppercase;letter-spacing:.4px;">Fornecedores</span>
        </div>
        <div style="overflow-x:auto;">
          <table class="preco-table" id="forn-info-table"></table>
        </div>
      </div>

      <!-- ═══ TABELA DE PREÇOS ═══ -->
      <div class="preco-table-wrap no-print" style="margin-bottom:20px;">
        <div class="no-print" style="padding:12px 16px;border-bottom:1px solid #e0e4ea;">
          <span class="card-title" style="font-size:13px;font-weight:700;color:#5a6478;text-transform:uppercase;letter-spacing:.4px;">Quadro Comparativo de Preços</span>
        </div>
        <div style="overflow-x:auto;">
          <table class="preco-table" id="preco-table">
            <thead id="preco-thead"></thead>
            <tbody id="preco-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- ═══ OBSERVAÇÕES ═══ -->
      <div class="obs-area no-print">
        <label>OBS</label>
        <textarea id="obs-geral" rows="2" placeholder="Ex: Os orçamentos vieram prontos, apenas elaboramos o QC."></textarea>
        <label style="margin-top:10px;">OBS — Portal de Compras Governamentais</label>
        <textarea id="obs-portal" rows="2" placeholder="Pesquisa realizada no Portal de Compras Governamentais (comprasnet.gov.br)..."></textarea>
      </div>

    </div>
  </main>
</div>

<div id="toast"></div>
<script src="js/pwa.js"></script>
<script src="js/auth.js"></script>
<script src="js/cotacao.js"></script>
</body>
</html>
